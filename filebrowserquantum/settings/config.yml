# SERVER SETTINGS - Basic connectivity and paths
server:
  port: 80
  baseURL: "/filebrowser"
  database: "/home/filebrowser/data/database.db"
  cacheDir: "/home/filebrowser/data/tmp"
  sources:
    - path: /srv/root
      name: "Tomcat Files"
      config:
        defaultEnabled: true

# AUTHENTICATION - Dual login: Password (fallback) + OIDC (Keycloak)
auth:
  tokenExpirationHours: 12  # Session timeout
  methods:
    password:
      enabled: true
      minLength: 8
      signup: false 
    oidc:
      enabled: true
      issuerUrl: "https://auth.awhadi.online/realms/awhadi"
      scopes: "openid profile email"
      userIdentifier: "preferred_username"
      createUser: true

# FRONTEND - Login screen appearance
frontend:
  name: "File Browser"
  oidcLoginButtonText: "Login with SSO"

# DEFAULT USER SETTINGS - Applied to new users (both OIDC and local)
userDefaults:
  darkMode: true
  locale: "en"
  viewMode: "list"
  singleClick: false
  permissions:
    admin: false
    modify: true
    share: true
    api: false
# SECURITY HEADERS - Basic hardening
security:
  headers:
    - "X-Content-Type-Options: nosniff"
    - "X-Frame-Options: DENY"
    - "X-XSS-Protection: 1; mode=block"
  loginRateLimit: 10

# FEATURES - Toggle functionality
features:
  shell: true
  search: true
  sharing: true
