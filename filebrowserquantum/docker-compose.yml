services:
  filebrowser:
    image: gtstef/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    env_file: .env
    ports:
      - "8090:80"
    user: "1000:1001"
    volumes:
      - /opt/tomcat:/srv/root
      - filebrowser_database:/home/filebrowser/data
      - ./settings/config.yml:/home/filebrowser/data/config.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  filebrowser_database:
